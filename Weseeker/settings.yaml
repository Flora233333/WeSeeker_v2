debug: True

llm:
  provider: deepseek # dashscope
  model: deepseek-reasoner # moonshotai/Kimi-K2.5, ZhipuAI/GLM-5, deepseek-reasoner
  is_multimodal: false
  api_key: ""
  api_base: "https://api.deepseek.com" # "https://api.deepseek.com" https://api-inference.modelscope.cn/v1
  temperature: 0.5
  timeout: 60
  # enable_thinking: "enabled"  # Qwen3 思考模型需要关闭，换其他模型时删除此行

everything:
  host: 127.0.0.1
  port: 8080

mcp:
  file_tools_port: 9100
  rag_tools_port: 9200

preview:
  text_depth_chars:
    L1: 4000
    L2: 8000
    L3: 12000
  excel_depth_rows:
    L1: 10
    L2: 50
    L3: 100
  pdf_depth_pages:
    L1: 1
    L2: 2
    L3: 3
  pdf_render_scale: 3.0

paths:
  desktop: "C:/Users/Flora/Desktop"
  downloads: "C:/Users/Flora/Downloads"
  documents: ""

storage:
  sqlite_path: storage/weseeker.db

rag:
  enabled: false
  chroma_persist_dir: storage/chroma
  docstore_dir: storage/docstore
  manifest_dir: storage/manifest
  embedding_provider: lmstudio
  embedding_model: text-embedding-qwen3-embedding-0.6b
  embedding_dimension: 1024
  embedding_batch_size: 8
  embedding_max_retries: 3
  lmstudio_embedding_base_url: http://100.65.78.10:1234/v1
  parent_chunk_size: 2000
  parent_chunk_overlap: 200
  child_chunk_size: 400
  child_chunk_overlap: 60
  semantic_breakpoint_percentile: 95
  semantic_min_chunk_chars: 100
  semantic_max_chunk_chars: 800
  max_file_size_mb: 50
  knowledge_bases: []
  chunk_size: 900
  chunk_overlap: 150
  top_k: 30

sender_target: 文件传输助手
